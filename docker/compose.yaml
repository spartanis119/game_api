services:
  game_api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /opt/data
    command: ["tail", "-f", "/dev/null"]
    image: game_api
    container_name: game_api
    ports:
      - "8005:8005"
      - "3902:3902"
    volumes:
      - ../:/opt/data
  redis:
   image: redis:8.0.6-alpine
   container_name: redis_server
   ports:
      - "6379:6379"
